name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.1). Must already exist.'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag
        id: version
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Sign APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/$(ls "$ANDROID_SDK_ROOT/build-tools" | tail -1)"
          UNSIGNED=app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED="app/build/outputs/apk/release/wetter-${VERSION}.apk"
          "$BUILD_TOOLS/apksigner" sign \
            --ks keystore.jks \
            --ks-key-alias my-key \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEYSTORE_PASSWORD" \
            --v1-signing-enabled false \
            --v2-signing-enabled true \
            --v3-signing-enabled false \
            --out "$SIGNED" \
            "$UNSIGNED"
          "$BUILD_TOOLS/apksigner" verify "$SIGNED"
          echo "APK_PATH=$SIGNED" >> "$GITHUB_ENV"

      - name: Create release and upload APK
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: ${{ github.api_url }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          RELEASE_ID=$(curl -sf -X POST \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"$TAG\", \"name\": \"$TAG\"}" \
            "$API_URL/repos/$REPOSITORY/releases" | jq -r .id)
          curl -sf -X POST \
            -H "Authorization: token $GITEA_TOKEN" \
            -F "attachment=@${APK_PATH};type=application/vnd.android.package-archive" \
            "$API_URL/repos/$REPOSITORY/releases/$RELEASE_ID/assets?name=$(basename "$APK_PATH")"
